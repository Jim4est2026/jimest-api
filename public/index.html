<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jimest</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.app {
  display: grid;
  grid-template-columns: 250px 1fr 300px;
  height: 100vh;
}

/* Panels */
.panel {
  background: #1e293b;
  padding: 15px;
  overflow-y: auto;
}

.panel h3 {
  margin-top: 0;
}

/* Chat */
.chat {
  display: flex;
  flex-direction: column;
  padding: 20px;
}

#messages {
  flex: 1;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
}

.user {
  color: #22c55e;
}

.assistant {
  color: #60a5fa;
}

/* Input */
.input-area {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* Buttons */
.option-buttons button {
  margin: 5px 5px 0 0;
  background: #6366f1;
}
</style>
</head>

<body>

<div class="app">

  <!-- LEFT: MEMORY -->
  <div class="panel">
    <h3>🧠 Memory</h3>
    <div id="memory"></div>
  </div>

  <!-- CENTER: CHAT -->
  <div class="chat">
    <h2>Jimest</h2>

    <div id="messages"></div>

    <div class="input-area">
      <input id="input" placeholder="Ask Jimest..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

  <!-- RIGHT: ASSETS -->
  <div class="panel">
    <h3>📁 Saved Assets</h3>
    <div id="assets"></div>
  </div>

</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;

  if (text.includes("## Next Step Options")) {
    const parts = text.split("## Next Step Options");

    div.innerHTML = parts[0];

    const btnContainer = document.createElement("div");
    btnContainer.className = "option-buttons";

    parts[1].split("\n").forEach(line => {
      const match = line.match(/\d+\.\s(.+)/);
      if (match) {
        const btn = document.createElement("button");
        btn.innerText = match[1];
        btn.onclick = () => send(match[1]);
        btnContainer.appendChild(btn);
      }
    });

    div.appendChild(btnContainer);
  } else {
    div.innerText = text;
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send(msg) {
  const message = msg || input.value;
  if (!message) return;

  addMessage("You: " + message, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  addMessage("Jimest: " + data.reply, "assistant");

  loadMemory();
  loadAssets();
}

async function loadMemory() {
  const res = await fetch("/memory");
  const data = await res.json();

  document.getElementById("memory").innerHTML = `
    Idea: ${data.businessIdea}<br>
    Target: ${data.targetCustomer}<br>
    Budget: ${data.budget}<br>
    Stage: ${data.stage}<br>
    Next: ${data.nextStep}
  `;
}

async function loadAssets() {
  const res = await fetch("/assets");
  const data = await res.json();

  const container = document.getElementById("assets");

  if (!data.length) {
    container.innerText = "No assets yet.";
    return;
  }

  container.innerHTML = "";

  data.forEach(a => {
    const div = document.createElement("div");
    div.style.marginBottom = "10px";
    div.style.borderBottom = "1px solid #334155";
    div.style.paddingBottom = "5px";

    div.innerHTML = `
      <b>${a.title}</b><br>
      <small>${a.content.substring(0, 100)}...</small>
    `;

    container.appendChild(div);
  });
}

loadMemory();
loadAssets();
</script>

</body>
</html>
