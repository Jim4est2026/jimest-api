<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jimest Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 90%;
      max-width: 700px;
      background: #1f2937;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    #messages {
      background: #0f172a;
      border-radius: 12px;
      padding: 15px;
      height: 350px;
      overflow-y: auto;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    .message {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
    }

    .assistant {
      background: #374151;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    #messageInput {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #10b981;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #059669;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h1>Jimest</h1>
    <div id="messages"></div>

    <div class="input-row">
      <input id="messageInput" type="text" placeholder="Ask Jimest something..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");

    function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = `message ${sender}`;

  // Detect Next Step Options
  if (text.includes("## Next Step Options")) {
    const parts = text.split("## Next Step Options");
    div.textContent = parts[0];

    const optionsText = parts[1];
    const lines = optionsText.split("\n");

    const buttonContainer = document.createElement("div");
    buttonContainer.style.marginTop = "10px";

    lines.forEach(line => {
      const match = line.match(/^\d+\.\s(.+)/);
      if (match) {
        const option = match[1];

        const btn = document.createElement("button");
        btn.textContent = option;
        btn.style.margin = "5px";
        btn.style.padding = "8px 12px";
        btn.style.borderRadius = "8px";
        btn.style.border = "none";
        btn.style.cursor = "pointer";
        btn.style.background = "#6366f1";
        btn.style.color = "white";

        btn.onclick = () => {
          sendMessage(option);
        };

        buttonContainer.appendChild(btn);
      }
    });

    div.appendChild(buttonContainer);
  } else {
    div.textContent = text;
  }

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

    async function sendMessage(customMessage = null) {
  const message = customMessage || messageInput.value.trim();
      if (!message) return;

      addMessage("You: " + message, "user");
      if (!customMessage) {
  messageInput.value = "";
}

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (data.reply) {
          addMessage("Jimest: " + data.reply, "assistant");
        } else if (data.error) {
          addMessage("Error: " + data.error, "assistant");
        } else {
          addMessage("Jimest: No response received.", "assistant");
        }
      } catch (error) {
        addMessage("Error: Could not reach Jimest.", "assistant");
      }
    }

    messageInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
